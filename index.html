<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETA Group Messenger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <h1>Friend ETA Broadcaster</h1>
      <p class="subtitle">Predict an arrival time and send it directly to your group chat.</p>

      <form id="eta-form" class="form-grid">
        <label>
          Friend's name
          <input id="friendName" type="text" placeholder="Alex" required />
        </label>

        <label>
          Current distance to destination (km)
          <input id="distance" type="number" min="0" step="0.1" placeholder="12.5" required />
        </label>

        <label>
          Average speed (km/h)
          <input id="speed" type="number" min="1" step="0.1" placeholder="35" required />
        </label>

        <label>
          Extra delay (minutes)
          <input id="delay" type="number" min="0" step="1" value="0" />
        </label>

        <label>
          Destination
          <input id="destination" type="text" placeholder="Downtown Cafe" required />
        </label>

        <label>
          Group chat link
          <input id="groupLink" type="url" placeholder="https://chat.example.com/group/xyz" required />
        </label>

        <button type="submit">Predict ETA</button>
      </form>
    </section>

    <section class="card result-card" id="resultCard" hidden>
      <h2>Predicted update</h2>
      <p id="etaLine"></p>
      <textarea id="messageBox" rows="4" readonly></textarea>
      <div class="actions">
        <button id="copyBtn" type="button">Copy message</button>
        <button id="sendBtn" type="button">Open group chat link</button>
      </div>
      <p class="hint">Tip: some chat apps prefill text via URL params. If your link supports it, append the copied message manually.</p>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
